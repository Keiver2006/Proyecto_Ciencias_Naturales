<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora MRU</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4CAF50, #2E7D32);
        color: white;
        text-align: center;
        padding: 30px;
    }
    .container{
        background: white;
        color: black;
        padding: 25px;
        border-radius: 10px;
        width: 350px;
        margin: auto;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }
    input, select, button{
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button{
        background-color: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover{
        background-color: #388E3C;
    }
    h1{
        margin-bottom: 20px;
    }
    .resultado{
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
        color: #2E7D32;
    }
</style>
</head>
<body>

<h1>Calculadora de MRU</h1>

<div class="container">
    <label>¿Qué deseas calcular?</label>
    <select id="opcion">
        <option value="distancia">Distancia (d = v × t)</option>
        <option value="velocidad">Velocidad (v = d ÷ t)</option>
        <option value="tiempo">Tiempo (t = d ÷ v)</option>
    </select>

    <input type="number" id="valor1" placeholder="Ingrese primer valor">
    <input type="number" id="valor2" placeholder="Ingrese segundo valor">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular(){
    let opcion = document.getElementById("opcion").value;
    let valor1 = parseFloat(document.getElementById("valor1").value);
    let valor2 = parseFloat(document.getElementById("valor2").value);
    let resultado = "";

    if(isNaN(valor1) || isNaN(valor2)){
        resultado = "Por favor ingrese valores válidos.";
    } else {
        if(opcion === "distancia"){
            resultado = "Distancia = " + (valor1 * valor2) + " metros";
        } 
        else if(opcion === "velocidad"){
            if(valor2 === 0){
                resultado = "El tiempo no puede ser 0.";
            } else {
                resultado = "Velocidad = " + (valor1 / valor2) + " m/s";
            }
        } 
        else if(opcion === "tiempo"){
            if(valor2 === 0){
                resultado = "La velocidad no puede ser 0.";
            } else {
                resultado = "Tiempo = " + (valor1 / valor2) + " segundos";
            }
        }
    }

    document.getElementById("resultado").innerHTML = resultado;
}
</script>

</body>
</html>
